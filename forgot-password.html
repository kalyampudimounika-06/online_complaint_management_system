<!DOCTYPE html>
<html>

<head>

    <title>Forgot Password</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
        }

        .login-container{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #3b82f6,
                #1e293b
            );
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .login-box button{
            width:100%;
            padding:12px;
            background:#3b82f6;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        .login-box button:hover{
            background:#2563eb;
        }

    </style>

</head>

<body>

<div class="top-header">

    <h1>
        Campus Complaint Management System
    </h1>

</div>

<div class="login-container">

    <div class="login-box">

        <h2>Forgot Password</h2>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <button onclick="sendResetLink()">
            Send Reset Link
        </button>

    </div>

</div>

<script>

async function sendResetLink() {

    const email =
        document.getElementById("email").value;

    if (!email) {

        alert("Please enter email");

        return;
    }

    try {

        const res = await fetch(
            "https://online-complaint-management-system-tul3.onrender.com/api/auth/forgot-password",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    email
                })
            }
        );

        const data = await res.json();

        console.log(data);

        // Redirect directly
        if (data.resetURL) {

            window.location.href =
                data.resetURL;

        } else {

            alert(
                data.message ||
                data.error ||
                "Something went wrong"
            );
        }

    } catch (err) {

        console.log(err);

        alert("Server Error");
    }
}

</script>

</body>
</html>
