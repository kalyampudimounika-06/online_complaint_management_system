<!DOCTYPE html>
<html>
<head>
    <title>Submit Complaint</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
        }

        .main { display: flex; }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            color: white;
            padding: 20px;
        }

        .sidebar ul { list-style: none; padding: 0; }

        .sidebar ul li {
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
        }

        .sidebar ul li:hover,
        .sidebar ul .active { background: #3b82f6; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .topbar {
            width: 100%;
            background: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-container {
            width: 100%;
            max-width: 750px;
            margin-top: 40px;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .section { margin-bottom: 25px; }

        .section h3 { margin-bottom: 10px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .full { grid-template-columns: 1fr; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="main">

    <div class="sidebar">
        <h2>ComplaintSystem</h2>
        <ul>
            <li onclick="location.href='dashboard.html'">Dashboard</li>
            <li class="active">Submit Complaint</li>
            <li onclick="location.href='my-complaints.html'">My Complaints</li>
        </ul>
    </div>

    <div class="content">

        <div class="topbar">Submit Complaint</div>

        <div class="form-container">
            <div class="form-box">

                <div class="section">
                    <h3>Complaint Type</h3>
                    <select id="type" onchange="toggleFields()">
                        <option value="individual">Individual</option>
                        <option value="group">Group</option>
                    </select>
                </div>

                <div class="section">
                    <h3>Complaint Details</h3>

                    <div class="form-grid">
                        <input id="title" placeholder="Complaint Title">
                        <select id="category">
                            <option value="">Select Category</option>
                            <option>Hostel</option>
                            <option>Transport</option>
                            <option>Academics</option>
                            <option>Classroom</option>
			    <option>Others</option>
                        </select>
                    </div>

                    <div class="form-grid full" style="margin-top:15px;">
                        <textarea id="desc" placeholder="Describe your issue..."></textarea>
                    </div>

                    <input type="file" id="file" />
                </div>

                <div id="individualFields" class="section">
                    <h3>Student Details</h3>
                    <div class="form-grid">
                        <input placeholder="Name">
                        <input placeholder="Roll Number">
                    </div>
                </div>

                <div id="groupFields" class="section" style="display:none;">
                    <h3>Group Members</h3>
                    <div id="members"></div>
                    <button type="button" onclick="addMember()">+ Add Student</button>
                </div>

                <button type="button" onclick="submitComplaint()">Submit Complaint</button>

            </div>
        </div>

    </div>

</div>

<!-- SCRIPT 1 -->
<script>
function toggleFields() {
    let type = document.getElementById("type").value;

    document.getElementById("groupFields").style.display =
        type === "group" ? "block" : "none";

    document.getElementById("individualFields").style.display =
        type === "individual" ? "block" : "none";
}

function addMember() {
    let div = document.createElement("div");

    div.innerHTML = `
        <div class="form-grid" style="margin-top:10px;">
            <input placeholder="Student Name">
            <input placeholder="Roll Number">
        </div>
    `;

    document.getElementById("members").appendChild(div);
}
</script>

<!-- SCRIPT 2 (FIXED) -->
<script>
async function submitComplaint() {

    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let category = document.getElementById("category").value;
    let file = document.getElementById("file").files[0];

    console.log(title, desc, category, file); // ✅ DEBUG

    if (!title || !desc || !category) {
        alert("Fill all fields");
        return;
    }

    let formData = new FormData();

    formData.append("title", title);
    formData.append("description", desc);
    formData.append("category", category);
    formData.append("userId", localStorage.getItem("userId"));

    if (file) {
        formData.append("file", file);
    }

    try {
        let res = await fetch("https://online-complaint-management-system-tul3.onrender.com/api/complaints", {
            method: "POST",
            body: formData   // ❗ DO NOT add headers here
        });

        let data = await res.json();
        console.log(data);

        alert("Complaint Submitted!");
        window.location.href = "my-complaints.html";

    } catch (err) {
        console.error(err);
        alert("Error submitting complaint");
    }
}
</script>
<script src="auth-check.js"></script>

<script>
checkUserAuth();
</script>

</body>
</html>
