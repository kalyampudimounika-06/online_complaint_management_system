<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        .dashboard-grid{

            display:grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap:25px;

            margin-top:30px;
        }

        .analytics-card{

            background:white;

            padding:25px;

            border-radius:16px;

            box-shadow:
                0 5px 15px rgba(0,0,0,0.08);

            margin-top:35px;
        }

        .analytics-card h2{

            text-align:center;

            margin-bottom:25px;
        }

        .chart-container{

            max-width:500px;

            margin:0 auto;
        }

    </style>

</head>

<body>

<!-- HEADER -->
<div class="top-header">

    <h1>
        Campus Complaint Management System
    </h1>

    <p class="subtitle">
        Smart Digital Complaint Portal
    </p>

</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>
            Admin Panel
        </h2>

        <ul>

            <li
                class="active"
                onclick="location.href='admin.html'"
            >
                Dashboard
            </li>

            <li
                onclick="
                    location.href='admin-complaints.html'
                "
            >
                Complaints
            </li>

        </ul>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- TOPBAR -->
        <div class="topbar">

            Welcome,
            <span id="username"></span>

            <button
                onclick="logout()"

                style="
                    float:right;
                    background:red;
                    padding:8px 15px;
                    border:none;
                    border-radius:6px;
                    color:white;
                    cursor:pointer;
                "
            >
                Logout
            </button>

        </div>

        <!-- DASHBOARD CARDS -->
        <div class="dashboard-grid">

            <!-- TOTAL -->
            <div class="card blue">

                <h2 id="totalCount">0</h2>

                <p>Total Complaints</p>

            </div>

            <!-- PENDING -->
            <div class="card orange">

                <h2 id="pendingCount">0</h2>

                <p>Pending</p>

            </div>

            <!-- IN PROGRESS -->
            <div class="card blue">

                <h2 id="progressCount">0</h2>

                <p>In Progress</p>

            </div>

            <!-- RESOLVED -->
            <div class="card green">

                <h2 id="resolvedCount">0</h2>

                <p>Resolved</p>

            </div>

        </div>

        <!-- ANALYTICS -->
        <div class="analytics-card">

            <h2>
                Complaint Analytics
            </h2>

            <div class="chart-container">

                <canvas id="complaintChart"></canvas>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">

    © 2026 Campus Complaint Management System

</footer>

<!-- DASHBOARD SCRIPT -->
<script>

let complaintChart;

async function loadDashboard() {

    try {

        const res = await fetch(
            "https://online-complaint-management-system-tul3.onrender.com/api/complaints"
        );

        const complaints =
            await res.json();

        let total =
            complaints.length;

        let pending =
            complaints.filter(
                c => c.status === "Pending"
            ).length;

        let progress =
            complaints.filter(
                c => c.status === "In Progress"
            ).length;

        let resolved =
            complaints.filter(
                c => c.status === "Resolved"
            ).length;

        // Update cards
        document.getElementById(
            "totalCount"
        ).innerText = total;

        document.getElementById(
            "pendingCount"
        ).innerText = pending;

        document.getElementById(
            "progressCount"
        ).innerText = progress;

        document.getElementById(
            "resolvedCount"
        ).innerText = resolved;

        // Chart
        const ctx =
            document.getElementById(
                "complaintChart"
            );

        if (complaintChart) {

            complaintChart.destroy();
        }

        complaintChart = new Chart(ctx, {

            type: "pie",

            data: {

                labels: [
                    "Pending",
                    "In Progress",
                    "Resolved"
                ],

                datasets: [{

                    data: [
                        pending,
                        progress,
                        resolved
                    ],

                    backgroundColor: [
                        "#f59e0b",
                        "#3b82f6",
                        "#22c55e"
                    ]

                }]
            },

            options: {

                responsive:true,

                plugins: {

                    legend: {

                        position:"top"
                    }
                }
            }
        });

    } catch (err) {

        console.log(
            "Dashboard Error:",
            err
        );
    }
}

// Load dashboard
document.addEventListener(
    "DOMContentLoaded",
    loadDashboard
);

// Auto refresh
setInterval(loadDashboard, 3000);

</script>

<!-- AUTH -->
<script src="auth-check.js"></script>

<script>

checkAdminAuth();

</script>

<!-- USERNAME -->
<script>

document.getElementById(
    "username"
).innerText =
    localStorage.getItem("name");

function logout() {

    if(confirm(
        "Are you sure you want to logout?"
    )) {

        localStorage.clear();

        window.location.href =
            "index.html";
    }
}

</script>

</body>
</html>
