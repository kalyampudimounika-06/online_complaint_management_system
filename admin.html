
<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="top-header">

        <h1>
            Campus Complaint Management System
        </h1>

    </div>

<div class="main">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Admin Panel</h2>

        <ul>

            <li
                class="active"
                onclick="location.href='admin.html'"
            >
                Dashboard
            </li>

            <li
                onclick="
                    location.href='admin-complaints.html'
                "
            >
                Complaints
            </li>

        </ul>

    </div>

    <!-- Content -->
    <div class="content">

        <!-- Topbar -->
        <div class="topbar">

            Welcome,
            <span id="username"></span>

            <button
                onclick="logout()"

                style="
                    float:right;
                    background:red;
                    padding:8px 15px;
                    border:none;
                    border-radius:6px;
                    color:white;
                    cursor:pointer;
                "
            >
                Logout
            </button>

        </div>

        <!-- Container -->
        <div class="container-box">

            <!-- Dashboard Cards -->
            <div class="cards">

                <!-- Total -->
                <div class="card blue">

                    <h2 id="totalCount">0</h2>

                    <p>Total Complaints</p>

                </div>

                <!-- Pending -->
                <div class="card orange">

                    <h2 id="pendingCount">0</h2>

                    <p>Pending</p>

                </div>

                <!-- In Progress -->
                <div class="card blue">

                    <h2 id="progressCount">0</h2>

                    <p>In Progress</p>

                </div>

                <!-- Resolved -->
                <div class="card green">

                    <h2 id="resolvedCount">0</h2>

                    <p>Resolved</p>

                </div>

            </div>

            <!-- Analytics Section -->
            <div
                style="
                    display:flex;
                    justify-content:center;
                    margin-top:50px;
                    width:100%;
                "
            >

                <div
                    style="
                        width:400px;
                        background:white;
                        padding:25px;
                        border-radius:15px;
                        box-shadow:0 5px 15px rgba(0,0,0,0.08);
                    "
                >

                    <h2
                        style="
                            text-align:center;
                            margin-bottom:20px;
                        "
                    >
                        Complaint Analytics
                    </h2>

                    <canvas id="complaintChart"></canvas>

                </div>

            </div>

        </div>

    </div>

<!-- Dashboard Script -->
<script>

let complaintChart;

async function loadDashboard() {

    try {

        // Fetch complaints
        const res = await fetch(
            "https://online-complaint-management-system-tul3.onrender.com/api/complaints"
        );

        const complaints = await res.json();

        // Counts
        let total = complaints.length;

        let pending = complaints.filter(
            c => c.status === "Pending"
        ).length;

        let progress = complaints.filter(
            c => c.status === "In Progress"
        ).length;

        let resolved = complaints.filter(
            c => c.status === "Resolved"
        ).length;

        // Update Cards
        document.getElementById("totalCount")
            .innerText = total;

        document.getElementById("pendingCount")
            .innerText = pending;

        document.getElementById("progressCount")
            .innerText = progress;

        document.getElementById("resolvedCount")
            .innerText = resolved;

        // Chart
        const ctx =
            document.getElementById("complaintChart");

        // Destroy old chart
        if (complaintChart) {

            complaintChart.destroy();
        }

        // Create new chart
        complaintChart = new Chart(ctx, {

            type: "pie",

            data: {

                labels: [
                    "Pending",
                    "In Progress",
                    "Resolved"
                ],

                datasets: [{

                    data: [
                        pending,
                        progress,
                        resolved
                    ],

                    backgroundColor: [
                        "#f59e0b",
                        "#3b82f6",
                        "#22c55e"
                    ]

                }]
            }
        });

    } catch (err) {

        console.log(
            "Dashboard Error:",
            err
        );
    }
}

// Load dashboard
document.addEventListener(
    "DOMContentLoaded",
    loadDashboard
);

// Auto refresh
setInterval(loadDashboard, 3000);

</script>

<!-- Auth -->
<script src="auth-check.js"></script>

<script>
checkAdminAuth();
</script>

<!-- Username -->
<script>

document.getElementById("username")
    .innerText =
    localStorage.getItem("name");

function logout() {

    if(confirm("Are you sure you want to logout?")) {

        localStorage.clear();

        window.location.href = "index.html";
    }
}

</script>
<footer class="footer">
    © 2026 Campus Complaint Management System
</footer>
</body>
</html>
