<!DOCTYPE html>
<html>

<head>

    <title>Reset Password</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
        }

        .login-container{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #3b82f6,
                #1e293b
            );
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .login-box button{
            width:100%;
            padding:12px;
            background:#3b82f6;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        .login-box button:hover{
            background:#2563eb;
        }

    </style>

</head>

<body>

<div class="top-header">

    <h1>
        Campus Complaint Management System
    </h1>

</div>

<div class="login-container">

    <div class="login-box">

        <h2>Reset Password</h2>

        <input
            type="password"
            id="password"
            placeholder="New Password"
        >

        <button onclick="resetPassword()">
            Reset Password
        </button>

    </div>

</div>

<script>

async function resetPassword() {

    const password =
        document.getElementById("password").value;

    const params = new URLSearchParams(
        window.location.search
    );

    const token = params.get("token");

    try {

        const res = await fetch(
            `https://online-complaint-management-system-tul3.onrender.com/api/auth/reset-password/${token}`,
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({ password })
            }
        );

        const data = await res.json();

        alert(data.message);

        window.location.href = "index.html";

    } catch (err) {

        console.log(err);

        alert("Password reset failed");
    }
}

</script>
<footer class="footer">
    © 2026 Campus Complaint Management System
</footer>
</body>
</html>
